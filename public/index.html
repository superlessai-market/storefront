<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPERLESS Market</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2865941930849930"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      background: rgb(30, 0, 255);
      color: #fff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .bg-gradient {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
    }

    .blob-1 { width: 600px; height: 600px; background: #ff0000; top: -20%; left: -10%; }
    .blob-2 { width: 500px; height: 500px; background: #0800ff; top: 30%; right: -15%; animation-delay: -2s; }
    .blob-3 { width: 400px; height: 400px; background: #00ff11; bottom: -10%; left: 30%; animation-delay: -4s; }
    .blob-4 { width: 350px; height: 350px; background: #ffea00; top: 10%; left: 50%; animation-delay: -6s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo img {
      height: 48px;
      transition: transform 0.3s;
    }

    .logo img:hover {
      transform: rotate(-25deg) scale(1.4);
    }

    .logo-sub {
      font-size: 0.875rem;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .app-card {
      display: block;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s, background 0.15s;
      backdrop-filter: blur(4px);
    }

    .app-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.18);
    }

    .app-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: top;
      display: block;
      background: rgba(255, 255, 255, 0.05);
    }

    .app-info {
      padding: 14px 16px;
    }

    .app-name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .app-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .wrap { padding: 40px 20px; }
      .logo img { height: 36px; }
    }

    @media (max-width: 420px) {
      .app-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="wrap">
    <header>
      <div class="logo">
        <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
        <img src="https://superless.ai/assets/images/superless/u.png" alt="U">
        <img src="https://superless.ai/assets/images/superless/p.png" alt="P">
        <img src="https://superless.ai/assets/images/superless/e.png" alt="E">
        <img src="https://superless.ai/assets/images/superless/r.png" alt="R">
        <img src="https://superless.ai/assets/images/superless/l.png" alt="L">
        <img src="https://superless.ai/assets/images/superless/e.png" alt="E">
        <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
        <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
      </div>
    </header>

    <div class="app-grid" id="apps"></div>
  </div>

  <script>
    fetch('/apps.json')
      .then(r => r.json())
      .then(apps => {
        const grid = document.getElementById('apps');
        grid.innerHTML = apps.map(app => `
          <a class="app-card" href="/${app.slug}/">
            <img class="app-thumb" src="/${app.slug}/thumbnail.png" alt="${app.name}" onerror="this.style.display='none'">
            <div class="app-info">
              <div class="app-name">${app.name}</div>
            </div>
          </a>
        `).join('');
      });
  </script>
</body>
</html>
