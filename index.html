<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPERLESS Market</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
      background: rgb(30, 0, 255);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* animated gradient blobs like superless.ai */
    .bg-gradient {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
    }

    .blob-1 {
      width: 600px; height: 600px;
      background: #ff0000;
      top: -20%; left: -10%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 500px; height: 500px;
      background: #0800ff;
      top: 30%; right: -15%;
      animation-delay: -2s;
    }

    .blob-3 {
      width: 400px; height: 400px;
      background: #00ff11;
      bottom: -10%; left: 30%;
      animation-delay: -4s;
    }

    .blob-4 {
      width: 350px; height: 350px;
      background: #ffea00;
      top: 10%; left: 50%;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    header {
      padding: 40px 32px 0;
      position: relative;
      z-index: 2;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo img {
      height: 48px;
      transition: transform 0.3s;
    }

    .logo img:hover {
      transform: rotate(-25deg) scale(1.4);
    }

    .logo-sub {
      font-size: 0.875rem;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .shelf {
      width: 100%;
      max-width: 720px;
    }

    .shelf-label {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.5;
      margin-bottom: 24px;
    }

    .shelf-rack {
      border: 2px dashed rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 60px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .shelf-icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    .shelf-msg {
      font-size: 1.25rem;
      font-weight: 700;
      opacity: 0.8;
    }

    .shelf-desc {
      font-size: 0.875rem;
      opacity: 0.5;
      max-width: 400px;
      line-height: 1.6;
    }

    /* app grid - ready for when apps arrive */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 1200px;
      padding: 0 32px;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 20px 16px;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s, background 0.15s;
      backdrop-filter: blur(4px);
    }

    .app-card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.2);
    }

    .app-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .app-card p {
      font-size: 0.75rem;
      opacity: 0.6;
      line-height: 1.4;
    }

    footer {
      padding: 24px 32px;
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.4;
      position: relative;
      z-index: 2;
    }

    @media (max-width: 480px) {
      header { padding: 24px 20px 0; }
      .logo img { height: 32px; }
      main { padding: 40px 20px; }
      .shelf-rack { padding: 40px 20px; }
      .app-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 0 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <header>
    <div class="logo">
      <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
      <img src="https://superless.ai/assets/images/superless/u.png" alt="U">
      <img src="https://superless.ai/assets/images/superless/p.png" alt="P">
      <img src="https://superless.ai/assets/images/superless/e.png" alt="E">
      <img src="https://superless.ai/assets/images/superless/r.png" alt="R">
      <img src="https://superless.ai/assets/images/superless/l.png" alt="L">
      <img src="https://superless.ai/assets/images/superless/e.png" alt="E">
      <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
      <img src="https://superless.ai/assets/images/superless/s.png" alt="S">
    </div>
    <div class="logo-sub">market.superless.ai</div>
  </header>

  <main>
    <div class="shelf">
      <div class="shelf-label">Apps</div>
      <div class="shelf-rack">
        <div class="shelf-icon">🛒</div>
        <div class="shelf-msg">진열 준비 중</div>
        <div class="shelf-desc">
          Superless AI 워크샵에서 만든 앱들이 곧 이곳에 채워집니다.
        </div>
      </div>
    </div>
  </main>

  <footer>Powered by SUPERLESS</footer>
</body>
</html>
